<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SCM Optimizer — Suite Completa</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
<style>
/* ═══════════════════════════════════════════
RESET & BASE
═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#eef2f7;color:#1e293b;min-height:100vh}

/* ═══════════════════════════════════════════
APP SHELL
═══════════════════════════════════════════ */
.app-shell{display:flex;min-height:100vh}

/* ── LEFT NAV ── */
.left-nav{
width:230px;flex-shrink:0;
background:linear-gradient(170deg,#0b3b3f 0%,#1b6b5e 100%);
display:flex;flex-direction:column;
position:sticky;top:0;height:100vh;overflow-y:auto;
box-shadow:4px 0 20px rgba(0,0,0,.18);
transition:width .25s;
z-index:100;
}
.nav-brand{
padding:1.5rem 1.2rem 1rem;
border-bottom:1px solid rgba(255,255,255,.1);
}
.nav-logo{display:flex;align-items:center;gap:10px;color:white;font-size:1.25rem;font-weight:800;text-decoration:none}
.nav-logo i{font-size:1.4rem;color:#6ee7d4}
.nav-tagline{font-size:.68rem;color:rgba(255,255,255,.55);margin-top:4px;letter-spacing:.04em}

.nav-section-label{
font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
color:rgba(255,255,255,.35);padding:.9rem 1.2rem .3rem;font-weight:600;
}
.nav-module-btn{
display:flex;align-items:center;gap:10px;
width:100%;padding:.75rem 1.2rem;
background:none;border:none;color:rgba(255,255,255,.7);
font-family:'Inter',sans-serif;font-size:.82rem;font-weight:500;
cursor:pointer;transition:all .18s;text-align:left;
border-left:3px solid transparent;position:relative;
}
.nav-module-btn:hover{background:rgba(255,255,255,.08);color:white}
.nav-module-btn.active{
background:rgba(110,231,212,.12);color:#6ee7d4;
border-left-color:#6ee7d4;font-weight:700;
}
.nav-module-btn .mod-icon{
width:30px;height:30px;border-radius:8px;
display:flex;align-items:center;justify-content:center;
font-size:.85rem;flex-shrink:0;
background:rgba(255,255,255,.1);
}
.nav-module-btn.active .mod-icon{background:rgba(110,231,212,.2);color:#6ee7d4}
.nav-mod-label{flex:1}
.nav-mod-badge{
font-size:.6rem;background:rgba(255,255,255,.15);
color:rgba(255,255,255,.6);padding:.1rem .4rem;
border-radius:10px;
}
.nav-module-btn.active .nav-mod-badge{background:rgba(110,231,212,.2);color:#6ee7d4}

.nav-step-list{overflow:hidden;max-height:0;transition:max-height .3s ease}
.nav-step-list.open{max-height:400px}
.nav-step-item{
display:flex;align-items:center;gap:8px;
padding:.5rem 1.2rem .5rem 2.2rem;
font-size:.75rem;color:rgba(255,255,255,.5);
cursor:pointer;transition:all .15s;
}
.nav-step-item:hover{color:rgba(255,255,255,.85)}
.nav-step-item.active{color:#6ee7d4;font-weight:600}
.nav-step-item.done{color:rgba(110,231,212,.6)}
.nav-step-dot{
width:18px;height:18px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:.6rem;font-weight:700;flex-shrink:0;
background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);
}
.nav-step-item.active .nav-step-dot{background:rgba(110,231,212,.25);color:#6ee7d4}
.nav-step-item.done .nav-step-dot{background:rgba(110,231,212,.15);color:#6ee7d4}

.nav-footer{margin-top:auto;padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,.08)}
.nav-progress-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:.5rem}
.nav-progress-fill{height:100%;background:linear-gradient(90deg,#6ee7d4,#2c7da0);border-radius:2px;transition:width .4s}
.nav-progress-text{font-size:.68rem;color:rgba(255,255,255,.45);margin-top:.35rem}

/* ── MAIN AREA ── */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* ── TOP BAR ── */
.top-bar{
background:white;border-bottom:1px solid #e2e8f0;
padding:.75rem 2rem;display:flex;align-items:center;gap:1rem;
position:sticky;top:0;z-index:90;
box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.top-bar-title{font-size:1rem;font-weight:700;color:#0f3d3a;flex:1}
.top-bar-breadcrumb{font-size:.75rem;color:#64748b}
.top-bar-breadcrumb span{color:#1e6f5c;font-weight:600}

/* ── CONTENT ── */
.content-area{flex:1;padding:1.6rem 2rem 2rem;overflow-y:auto;background:#eef2f7}

/* ═══════════════════════════════════════════
MODULE HEADER
═══════════════════════════════════════════ */
.module-header{
background:linear-gradient(135deg,#0b3b3f,#1b6b5e);
color:white;border-radius:20px;
padding:1.4rem 1.8rem;margin-bottom:1.4rem;
display:flex;align-items:center;gap:1rem;
}
.mh-icon{font-size:2rem;opacity:.9}
.mh-title{font-size:1.2rem;font-weight:800}
.mh-sub{font-size:.8rem;opacity:.75;margin-top:.15rem}
.mh-badges{margin-left:auto;display:flex;gap:.5rem;flex-wrap:wrap}
.mh-badge{
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.2);
color:rgba(255,255,255,.9);
padding:.25rem .7rem;border-radius:20px;font-size:.7rem;font-weight:600;
}

/* ═══════════════════════════════════════════
STEPS NAV (horizontal inside module)
═══════════════════════════════════════════ */
.steps-nav{
display:flex;flex-wrap:wrap;background:white;
border-radius:14px;padding:.3rem .5rem;
margin-bottom:1.4rem;gap:.2rem;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.step-btn{
background:none;border:none;padding:.6rem .9rem;
font-size:.8rem;font-weight:600;color:#64748b;
cursor:pointer;display:flex;align-items:center;gap:6px;
border-radius:10px;transition:all .18s;flex:1;justify-content:center;
min-width:0;
}
.step-btn:hover{background:#f1f5f9;color:#1e293b}
.step-btn.active{background:#eafaf6;color:#1e6f5c}
.step-num{
background:#e2e8f0;color:#64748b;
width:22px;height:22px;border-radius:50%;
display:inline-flex;align-items:center;justify-content:center;
font-size:.68rem;font-weight:700;flex-shrink:0;
}
.step-btn.active .step-num{background:#1e6f5c;color:white}
.step-btn.done .step-num{background:#6ee7d4;color:#0b3b3f}
@media(max-width:700px){.step-btn span:not(.step-num){display:none}}

/* ═══════════════════════════════════════════
UPLOAD PANEL
═══════════════════════════════════════════ */
.upload-panel{
background:white;border-radius:16px;padding:1.1rem 1.4rem;
margin-bottom:1.4rem;border:1px solid #e2edf2;
display:flex;flex-wrap:wrap;gap:.8rem;align-items:center;
}
.upload-group{display:flex;flex-wrap:wrap;gap:.6rem;flex:1;align-items:center}
.upload-item{display:flex;align-items:center;gap:.4rem;font-size:.78rem;font-weight:600;color:#475569}
.upload-item input[type=file]{
padding:5px 10px;border-radius:10px;border:1px dashed #94a3b8;
font-size:.72rem;cursor:pointer;color:#475569;background:#f8fafc;
transition:border-color .2s;
}
.upload-item input[type=file]:hover{border-color:#1e6f5c}
.btn-example{
background:white;border:1.5px solid #1e6f5c;color:#1e6f5c;
padding:.45rem 1.1rem;border-radius:20px;
font-weight:600;font-size:.78rem;cursor:pointer;
transition:all .18s;display:flex;align-items:center;gap:.4rem;
white-space:nowrap;
}
.btn-example:hover{background:#eafaf6}
.upload-status{margin-top:.3rem;width:100%}
.toast{
display:inline-flex;align-items:center;gap:.4rem;
background:#1e6f5c;color:white;
padding:.4rem 1rem;border-radius:20px;font-size:.75rem;font-weight:500;
}
.toast.error{background:#dc2626}

/* ═══════════════════════════════════════════
STEP CONTENT
═══════════════════════════════════════════ */
.step-content{min-height:400px}
.card{
background:white;border-radius:18px;
box-shadow:0 2px 12px rgba(0,0,0,.05);
padding:1.4rem 1.6rem;margin-bottom:1.3rem;
border:1px solid #eef2f6;
}
.card h2{font-size:1rem;font-weight:700;color:#0f3d3a;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.card h3{font-size:.88rem;font-weight:700;color:#1e6f5c;margin:1rem 0 .5rem;padding-left:10px;border-left:3px solid #1e6f5c}
.card h4{font-size:.82rem;font-weight:600;color:#475569;margin:.8rem 0 .4rem}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:.82rem;margin:.6rem 0}
th{background:#f1f5f9;padding:8px 10px;text-align:left;font-weight:700;font-size:.72rem;color:#475569;letter-spacing:.04em;text-transform:uppercase;border-bottom:2px solid #e2e8f0}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9;color:#334155}
tr:hover td{background:#f8fbff}
tr:last-child td{border-bottom:none}

/* BADGES */
.badge{display:inline-block;border-radius:20px;padding:2px 10px;font-size:.68rem;font-weight:700}
.badge-A{background:#dbeafe;color:#1d4ed8}
.badge-B{background:#fef3c7;color:#92400e}
.badge-C{background:#f1f5f9;color:#64748b}
.badge-Alto{background:#fee2e2;color:#dc2626}
.badge-Medio{background:#ffedd5;color:#c2410c}
.badge-Bajo{background:#dcfce7;color:#166534}
.badge-Alta{background:#dbeafe;color:#1d4ed8}
.badge-Media{background:#fef3c7;color:#92400e}
.badge-Baja{background:#f1f5f9;color:#64748b}

/* KPIs */
.kpi-row{display:flex;flex-wrap:wrap;gap:.9rem;margin:.8rem 0}
.kpi-card{
background:linear-gradient(135deg,#f8fafc,#f0fdf4);
border:1px solid #e2edf2;border-radius:14px;
padding:.9rem 1rem;flex:1 1 160px;text-align:center;
}
.kpi-card strong{display:block;font-size:1.2rem;color:#1e6f5c;font-weight:800;margin:.2rem 0}
.kpi-card span{font-size:.72rem;color:#64748b;font-weight:500}
.kpi-card p{font-size:.75rem;color:#334155;margin-top:.2rem}

/* PROBLEMS */
.problema{border-left:4px solid;margin:.6rem 0;padding:.8rem 1rem;border-radius:0 12px 12px 0}
.problema.alto{border-color:#dc2626;background:#fef2f2}
.problema.medio{border-color:#f59e0b;background:#fffbeb}
.problema.bajo{border-color:#22c55e;background:#f0fdf4}
.problema strong{font-size:.83rem;color:#1e293b}
.problema p{font-size:.78rem;color:#475569;margin-top:.2rem}

/* BUTTONS */
.btn-primary{
background:linear-gradient(135deg,#1e6f5c,#0b3b3f);
color:white;border:none;padding:.6rem 1.4rem;
border-radius:20px;font-weight:600;font-size:.8rem;
cursor:pointer;transition:all .18s;
display:inline-flex;align-items:center;gap:.4rem;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(30,111,92,.3)}
.btn-secondary{
background:white;border:1.5px solid #1e6f5c;color:#1e6f5c;
padding:.55rem 1.2rem;border-radius:20px;font-weight:600;
font-size:.8rem;cursor:pointer;transition:all .18s;
}
.btn-secondary:hover{background:#eafaf6}
.btn-row{display:flex;gap:.6rem;flex-wrap:wrap;margin:.8rem 0}

/* INPUTS */
.modern-input{
width:100%;padding:.7rem 1rem;border-radius:12px;
border:1.5px solid #e2e8f0;font-size:.83rem;
font-family:'Inter',sans-serif;transition:border-color .18s;
margin-bottom:.8rem;
}
.modern-input:focus{outline:none;border-color:#1e6f5c;box-shadow:0 0 0 3px rgba(30,111,92,.08)}
label{font-size:.75rem;font-weight:600;color:#475569;display:block;margin-bottom:.25rem}

/* CHARTS */
.chart-box{margin:.8rem 0;height:380px;border-radius:12px;overflow:hidden}
.graph-row{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin:.8rem 0}
/* FIX 1: was .graph-col{} — empty rule removed, replaced with proper declaration */
.graph-col{min-width:0}
.graph-title{font-weight:700;font-size:.82rem;color:#1e6f5c;border-left:3px solid #1e6f5c;padding-left:10px;margin-bottom:.4rem}
@media(max-width:800px){.graph-row{grid-template-columns:1fr}}

/* CHAIN VISUAL */
.chain-flow{display:flex;align-items:center;overflow-x:auto;gap:0;padding:.5rem 0;flex-wrap:nowrap}
.chain-node{
display:flex;flex-direction:column;align-items:center;text-align:center;
background:white;border:1.5px solid #e2e8f0;border-radius:12px;
padding:.8rem .7rem;min-width:95px;flex-shrink:0;
transition:all .18s;
}
.chain-node:hover{border-color:#1e6f5c;transform:translateY(-2px)}
.chain-node .cn-icon{font-size:1.4rem;margin-bottom:.3rem}
.chain-node .cn-label{font-size:.72rem;font-weight:700;color:#1e293b}
.chain-node .cn-sub{font-size:.62rem;color:#64748b;margin-top:.1rem}
.chain-arrow{color:#94a3b8;font-size:1.2rem;padding:0 .2rem;flex-shrink:0}

/* NAV BOTTOM */
.step-nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #f1f5f9}
.step-counter{font-size:.78rem;color:#64748b;background:#f1f5f9;padding:.35rem .8rem;border-radius:20px}

/* ═══════════════════════════════════════════
LANDING PAGE
═══════════════════════════════════════════ */
.landing{
display:flex;flex-direction:column;align-items:center;justify-content:center;
min-height:calc(100vh - 60px);padding:2rem;text-align:center;
}
.landing-logo{font-size:3.5rem;margin-bottom:1rem}
.landing-title{font-size:2rem;font-weight:800;color:#0b3b3f;margin-bottom:.5rem}
.landing-sub{font-size:.95rem;color:#64748b;max-width:500px;line-height:1.6;margin-bottom:2rem}
.module-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;max-width:900px;width:100%}
.module-card{
background:white;border-radius:18px;padding:1.5rem 1.2rem;text-align:center;
border:1.5px solid #e2e8f0;cursor:pointer;transition:all .2s;
}
.module-card:hover{border-color:#1e6f5c;transform:translateY(-3px);box-shadow:0 8px 24px rgba(30,111,92,.12)}
.module-card .mc-icon{font-size:2rem;margin-bottom:.6rem}
.module-card .mc-name{font-size:.92rem;font-weight:700;color:#1e293b}
.module-card .mc-desc{font-size:.75rem;color:#64748b;margin-top:.3rem;line-height:1.5}
.module-card .mc-badge{
display:inline-block;margin-top:.6rem;
background:#eafaf6;color:#1e6f5c;
padding:.2rem .7rem;border-radius:20px;font-size:.68rem;font-weight:600;
}

/* RESPONSIVE */
@media(max-width:600px){
.left-nav{width:64px}
.nav-mod-label,.nav-tagline,.nav-mod-badge,.nav-section-label,.nav-step-list,.nav-footer p,.nav-progress-text{display:none}
.nav-brand{padding:.8rem .6rem}
.nav-logo span{display:none}
.nav-module-btn{padding:.65rem;justify-content:center}
.content-area{padding:1rem}
.top-bar{padding:.6rem 1rem}
}
</style>
</head>
<body>
<div class="app-shell">

<!-- ══ LEFT NAV ══ -->
<nav class="left-nav" id="leftNav">
<div class="nav-brand">
    <a class="nav-logo" href="#" onclick="showLanding()"><i class="fas fa-chart-line"></i><span>SCM Suite</span></a>
    <div class="nav-tagline">Optimización de Cadena de Suministro</div>
</div>

<div class="nav-section-label">Módulos</div>

<button class="nav-module-btn" id="navBtn-abc" onclick="selectModule('abc')">
    <span class="mod-icon"><i class="fas fa-tags"></i></span>
    <span class="nav-mod-label">ABC Productos</span>
    <span class="nav-mod-badge">7p</span>
</button>
<div class="nav-step-list" id="navSteps-abc"></div>

<button class="nav-module-btn" id="navBtn-planes" onclick="selectModule('planes')">
    <span class="mod-icon"><i class="fas fa-industry"></i></span>
    <span class="nav-mod-label">Planes Producción</span>
    <span class="nav-mod-badge">7p</span>
</button>
<div class="nav-step-list" id="navSteps-planes"></div>

<button class="nav-module-btn" id="navBtn-dist" onclick="selectModule('dist')">
    <span class="mod-icon"><i class="fas fa-truck"></i></span>
    <span class="nav-mod-label">Distribución</span>
    <span class="nav-mod-badge">7p</span>
</button>
<div class="nav-step-list" id="navSteps-dist"></div>

<button class="nav-module-btn" id="navBtn-abas" onclick="selectModule('abas')">
    <span class="mod-icon"><i class="fas fa-boxes"></i></span>
    <span class="nav-mod-label">Abastecimiento</span>
    <span class="nav-mod-badge">7p</span>
</button>
<div class="nav-step-list" id="navSteps-abas"></div>

<div class="nav-footer">
    <p style="font-size:.68rem;color:rgba(255,255,255,.4)">Progreso total</p>
    <div class="nav-progress-bar"><div class="nav-progress-fill" id="globalProgress" style="width:0%"></div></div>
    <div class="nav-progress-text" id="globalProgressText">0 / 28 pasos</div>
</div>
</nav>

<!-- ══ MAIN ══ -->
<div class="main-area">
<div class="top-bar">
    <div>
    <div class="top-bar-title" id="topTitle">SCM Optimizer — Suite Completa</div>
    <div class="top-bar-breadcrumb" id="topBreadcrumb">Selecciona un módulo para comenzar</div>
    </div>
    <button class="btn-primary" style="font-size:.75rem;padding:.4rem .9rem" onclick="showLanding()"><i class="fas fa-home"></i> Inicio</button>
</div>

<div class="content-area" id="contentArea">
    <!-- Landing injected here -->
</div>
</div>
</div>

<script>
'use strict';

/* ════════════════════════════════════════════
ESTADO GLOBAL
════════════════════════════════════════════ */
const STATE = {
activeModule: null,
steps: { abc:1, planes:1, dist:1, abas:1 },
doneSteps: { abc:new Set(), planes:new Set(), dist:new Set(), abas:new Set() },
data: {
    abc: { productos:[] },
    planes: { planes:[], mejorPlan:null, datosCargados:false,
            empresa:{nombre:'Mi Empresa',sector:'Alimentos',producto:'Planificación',mercado:'Nacional'} },
    dist: { distancias:[],plantas:[],cds:[],demandas:[],capacidades:[],
            ofertaTotal:0,demandaTotal:0,deficit:0,
            capacidadCamion:1037,costoUnitarioKm:0.03,datosCargados:false,
            empresa:{nombre:'Mi Empresa',sector:'Logística',producto:'Distribución',mercado:'Nacional'} },
    abas: { compras:[],categorias:[],productos:[],proveedores:[],anos:[],
            gastoTotal:0,datosCargados:false,
            empresa:{nombre:'Mi Empresa',sector:'Alimentos',producto:'Productos lácteos',mercado:'Nacional'} }
}
};

const MOD_INFO = {
abc:   { icon:'fas fa-tags',    color:'#1e6f5c', name:'ABC de Productos',    sub:'Clasificación ABC, EOQ, análisis de inventario' },
planes:{ icon:'fas fa-industry',color:'#2c7da0', name:'Planes de Producción',sub:'Comparación y optimización de planes A, B, C, D' },
dist:  { icon:'fas fa-truck',   color:'#0b3b3f', name:'Distribución',        sub:'Transporte óptimo, MST, viajes por CD' },
abas:  { icon:'fas fa-boxes',   color:'#6b5b2e', name:'Abastecimiento',      sub:'Proveedores, HHI, pronóstico de compras' }
};

const STEP_NAMES = ['Contexto','Actores','Indicadores','Datos','Problemas','Optimización','Escenario Ideal'];

/* ════════════════════════════════════════════
INIT
════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded',()=>{
buildSidebarStepLists();
showLanding();
});

function buildSidebarStepLists(){
['abc','planes','dist','abas'].forEach(mod=>{
    const el = document.getElementById(`navSteps-${mod}`);
    el.innerHTML = STEP_NAMES.map((n,i)=>`
    <div class="nav-step-item" id="navStep-${mod}-${i+1}" onclick="goToStep('${mod}',${i+1})">
        <span class="nav-step-dot">${i+1}</span><span>${n}</span>
    </div>`).join('');
});
}

/* ════════════════════════════════════════════
LANDING
════════════════════════════════════════════ */
function showLanding(){
STATE.activeModule = null;
document.getElementById('topTitle').textContent = 'SCM Optimizer — Suite Completa';
document.getElementById('topBreadcrumb').textContent = 'Selecciona un módulo para comenzar';
document.querySelectorAll('.nav-module-btn').forEach(b=>b.classList.remove('active'));
document.querySelectorAll('.nav-step-list').forEach(l=>l.classList.remove('open'));
document.getElementById('contentArea').innerHTML = `
    <div class="landing">
    <div class="landing-logo">📊</div>
    <h1 class="landing-title">SCM Optimizer Suite</h1>

NAVEGACIÓN DE MÓDULOS
════════════════════════════════════════════ */
function selectModule(mod){
STATE.activeModule = mod;
document.querySelectorAll('.nav-module-btn').forEach(b=>b.classList.remove('active'));
document.querySelectorAll('.nav-step-list').forEach(l=>l.classList.remove('open'));
document.getElementById(`navBtn-${mod}`).classList.add('active');
document.getElementById(`navSteps-${mod}`).classList.add('open');
const info = MOD_INFO[mod];
document.getElementById('topTitle').textContent = info.name;
document.getElementById('topBreadcrumb').innerHTML = `SCM Suite / <span>${info.name}</span>`;
renderModule(mod);
}

function goToStep(mod, step){
if(mod !== STATE.activeModule) selectModule(mod);
STATE.steps[mod] = step;
renderModuleContent(mod);
updateSidebarSteps(mod);
updateProgress();
}

function updateSidebarSteps(mod){
for(let i=1;i<=7;i++){
    const el = document.getElementById(`navStep-${mod}-${i}`);
    if(!el) continue;
    el.className = 'nav-step-item';
    if(i === STATE.steps[mod]) el.classList.add('active');
    else if(STATE.doneSteps[mod].has(i)) el.classList.add('done');
}
}

function updateProgress(){
let total=0;
Object.values(STATE.doneSteps).forEach(s=>total+=s.size);
document.getElementById('globalProgress').style.width = Math.round(total/28*100)+'%';
document.getElementById('globalProgressText').textContent = `${total} / 28 pasos`;
}

/* ════════════════════════════════════════════
EXCEL READERS
════════════════════════════════════════════ */
function readExcel(mod, file){
const reader = new FileReader();
reader.onload = e => {
    const wb = XLSX.read(new Uint8Array(e.target.result),{type:'array'});
    if(mod==='abc')    parseABC(wb, file.name);
    if(mod==='planes') parsePlanes(wb, file.name);
    if(mod==='dist')   parseDist(wb, file.name);
    if(mod==='abas')   parseAbas(wb, file.name);
};
reader.readAsArrayBuffer(file);
}

function getRows(wb, sheetIdx=0){ const ws=wb.Sheets[wb.SheetNames[sheetIdx]]; return XLSX.utils.sheet_to_json(ws,{header:1,defval:''}); }
function fNum(v){ return parseFloat(String(v).replace(/[^0-9.-]/g,''))||0; }
function mapCol(hdr, keys){ for(let i=0;i<hdr.length;i++){const c=String(hdr[i]).toLowerCase();for(const k of keys)if(c.includes(k))return i;} return -1; }

function parseABC(wb, name){
const rows = getRows(wb);
let hi=-1,hdr=null;
for(let i=0;i<Math.min(rows.length,15);i++){const r=rows[i];const s=r.map(c=>String(c).toLowerCase()).join(' ');if(s.includes('producto')||s.includes('cantidad')||s.includes('precio')){hdr=r;hi=i;break;}}
if(!hdr){showMsg('abc','❌ No se encontraron encabezados',true);return;}
const pI=mapCol(hdr,['producto','nombre','item']);
const qI=mapCol(hdr,['cantidad','unidades','anual']);
const prI=mapCol(hdr,['precio','unitario']);
const sI=mapCol(hdr,['costo de pedido','costo pedido','setup']);
const uI=mapCol(hdr,['unidad','medida']);
if(pI===-1){showMsg('abc','❌ No se encontró columna Producto',true);return;}
// Inferir unidad de medida por nombre si no hay columna explícita
function inferUnidad(nombre, colVal){
    if(colVal&&String(colVal).trim()&&String(colVal).trim().length<15) return String(colVal).trim();
    const n=nombre.toLowerCase();
    if(n.includes('leche')||n.includes('yogur')||n.includes('suero')||n.includes('crema')) return 'litros';
    if(n.includes('queso')||n.includes('mantequilla')||n.includes('quesillo')||n.includes('manteca')) return 'kg';
    return 'uds';
}
const prods=[];
for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];if(!r.length)continue;
    const nombre=String(r[pI]||'').trim();
    if(!nombre||nombre.toLowerCase()==='total')continue;
    const cantidad=qI>-1?fNum(r[qI]):0, precio=prI>-1?fNum(r[prI]):0;
    if(cantidad===0&&precio===0)continue;
    const unidad=inferUnidad(nombre, uI>-1?r[uI]:'');
    prods.push({producto:nombre,cantidad,precio,unidad,costoPedido:sI>-1&&fNum(r[sI])>0?fNum(r[sI]):50,ventaTotal:cantidad*precio});
}
if(!prods.length){showMsg('abc','❌ No se encontraron productos',true);return;}
STATE.data.abc.productos=prods;
showMsg('abc',`✅ ${prods.length} productos cargados desde ${name}`);
renderModuleContent('abc');
}

function parsePlanes(wb, name){
const rows=getRows(wb);
let hi=-1,hdr=null;
for(let i=0;i<Math.min(rows.length,20);i++){const s=rows[i].map(c=>String(c).toLowerCase()).join(' ');if(s.includes('plan')&&(s.includes('costo total')||s.includes('costo'))){hdr=rows[i];hi=i;break;}}
if(!hdr){showMsg('planes','❌ No se encontró fila Plan/Costo',true);return;}
const getI=kws=>{for(let i=0;i<hdr.length;i++){const c=String(hdr[i]).toLowerCase();for(const k of kws)if(c.includes(k))return i;}return -1;};
const iP=getI(['plan']),iC=getI(['costo total','costo']),iCt=getI(['contratación','contratacion']),iD=getI(['despido']),iS=getI(['subcontratación','subcontratacion']),iH=getI(['horas extra','hora extra']),iIn=getI(['inventario','almacenamiento']);
if(iP===-1||iC===-1){showMsg('planes','❌ Columnas Plan/Costo no encontradas',true);return;}
const planes=[];
for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];if(!r.length)continue;
    const nombre=String(r[iP]||'').trim().toUpperCase().replace('PLAN ','');
    if(!['A','B','C','D'].includes(nombre))continue;
    const ct=fNum(r[iC]);if(!ct)continue;
    const cCont=iCt>-1?fNum(r[iCt]):0;
    const cDesp=iD>-1?fNum(r[iD]):0;
    const cSub=iS>-1?fNum(r[iS]):0;
    const cHex=iH>-1?fNum(r[iH]):0;
    const cInv=iIn>-1?fNum(r[iIn]):0;
    // Costo total = suma de todos los componentes (si los hay); de lo contrario usar valor leído
    const sumComp=cCont+cDesp+cSub+cHex+cInv;
    const costoFinal=sumComp>0?sumComp:ct;
    planes.push({nombre,costoTotal:costoFinal,costoContratacion:cCont,costoDespido:cDesp,costoSubcontratacion:cSub,costoHorasExtra:cHex,costoInventario:cInv});
}
if(!planes.length){showMsg('planes','❌ No se encontraron planes A/B/C/D',true);return;}
planes.sort((a,b)=>a.nombre.localeCompare(b.nombre));
STATE.data.planes.planes=planes;
STATE.data.planes.datosCargados=true;
STATE.data.planes.mejorPlan=planes.reduce((m,p)=>p.costoTotal<m.costoTotal?p:m,planes[0]).nombre;
showMsg('planes',`✅ ${planes.length} planes cargados. Mejor: ${STATE.data.planes.mejorPlan}`);
renderModuleContent('planes');
}

/* ════════════════════════════════════════════
FIX 2: parseDist — filtrar filas de título ("Centro","Planta") y deduplicar plantas
════════════════════════════════════════════ */
function parseDist(wb, name){
const rows=getRows(wb);
let hiRow=-1,hdr=null;
for(let i=0;i<rows.length;i++){const f=String(rows[i][0]||'').toLowerCase().trim();if(f==='origen'||f==='plantas'||f==='planta'){hdr=rows[i];hiRow=i;break;}}
const norm=s=>s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
let cds=[],plantas=[],dists=[];
if(hiRow>-1){
    cds=hdr.slice(1).map(c=>String(c).trim()).filter(c=>c&&!c.toLowerCase().includes('km'));
    for(let i=hiRow+1;i<rows.length;i++){
    const r=rows[i];if(!r.length)continue;
    const p=String(r[0]||'').trim();if(!p||p.toLowerCase()==='total')continue;
    const vals=r.slice(1,cds.length+1).map(fNum);
    if(vals.filter(v=>!isNaN(v)).length===cds.length&&vals.length===cds.length){plantas.push(p);dists.push(vals);}
    }
}
if(!plantas.length){const d=DEMO_DATA.dist;STATE.data.dist={...STATE.data.dist,...d,ofertaTotal:d.capacidades.reduce((a,b)=>a+b,0),demandaTotal:d.demandas.reduce((a,b)=>a+b,0),deficit:0,datosCargados:true};showMsg('dist','⚠️ Sin tabla de distancias válida — usando datos de ejemplo');renderModuleContent('dist');return;}

const cdsNorm=cds.map(norm);

// FIX 2a: palabras reservadas que son títulos/encabezados, no plantas reales
const EXCLUDE_WORDS=['centro','planta','subtotal','total','origen'];
const plantasFilt=plantas.filter(p=>!cdsNorm.includes(norm(p))&&!EXCLUDE_WORDS.includes(norm(p)));

// FIX 2b: deduplicar — conservar solo la primera aparición de cada planta
const plantasUniq=[],seen=new Set();
plantasFilt.forEach(p=>{if(!seen.has(p.toLowerCase())){seen.add(p.toLowerCase());plantasUniq.push(p);}});
const distsFilt=plantasUniq.map(p=>{const oi=plantas.indexOf(p);return dists[oi];});

let dems=new Array(cds.length).fill(0);
const defDems=[7500,6500,5500,6000,6500,5000];
for(let i=0;i<cds.length&&i<defDems.length;i++) dems[i]=defDems[i];

// FIX 2c: usar plantasUniq en lugar de plantasFilt
const caps=plantasUniq.length>=2?[16000,20000]:new Array(plantasUniq.length).fill(18000);
const d=STATE.data.dist;
d.plantas=plantasUniq;d.cds=cds;d.distancias=distsFilt;d.demandas=dems;d.capacidades=caps;
d.ofertaTotal=caps.reduce((a,b)=>a+b,0);d.demandaTotal=dems.reduce((a,b)=>a+b,0);
d.deficit=Math.max(0,d.demandaTotal-d.ofertaTotal);d.datosCargados=true;
showMsg('dist',`✅ ${plantasUniq.length} plantas, ${cds.length} CDs cargados de ${name}`);
renderModuleContent('dist');
}

function parseAbas(wb, name){
const rows=getRows(wb);
const hdr=rows[0];
const fi=k=>hdr.findIndex(c=>String(c).toLowerCase().includes(k));
const iA=fi('año'),iP=fi('producto'),iCat=fi('categor'),iProv=fi('proveedor'),iQ=fi('cantidad'),iUn=fi('unidad'),iPr=fi('precio unitario'),iCT=fi('costo total'),iImp=fi('importancia');
if(iA===-1||iP===-1||iCT===-1){showMsg('abas','❌ Columnas requeridas no encontradas',true);return;}
const compras=[];
for(let i=1;i<rows.length;i++){
    const r=rows[i];if(!r.length)continue;
    const año=parseInt(r[iA]);if(isNaN(año))continue;
    const prod=String(r[iP]||'').trim();if(!prod)continue;
    compras.push({Año:año,Producto:prod,Categoria:iCat>-1?String(r[iCat]||''):'',Proveedor:iProv>-1?String(r[iProv]||''):'',Cantidad:iQ>-1?fNum(r[iQ]):0,Unidad:iUn>-1?String(r[iUn]||''):'',Precio:iPr>-1?fNum(r[iPr]):0,CostoTotal:fNum(r[iCT]),Importancia:iImp>-1?String(r[iImp]||''):'Media'});
}
if(!compras.length){showMsg('abas','❌ No se encontraron registros',true);return;}
STATE.data.abas.compras=compras;
procesarAbas();
showMsg('abas',`✅ ${compras.length} registros cargados de ${name}`);
renderModuleContent('abas');
}

function procesarAbas(){
const d=STATE.data.abas;
d.categorias=[...new Set(d.compras.map(c=>c.Categoria))].sort();
d.productos=[...new Set(d.compras.map(c=>c.Producto))].sort();
d.proveedores=[...new Set(d.compras.map(c=>c.Proveedor))].sort();
d.anos=[...new Set(d.compras.map(c=>c.Año))].sort();
d.gastoTotal=d.compras.reduce((s,c)=>s+c.CostoTotal,0);
d.datosCargados=true;
}

/* ════════════════════════════════════════════
ALGORITMOS COMPARTIDOS
════════════════════════════════════════════ */
function calcEOQ(D,S,H){ return H>0?Math.sqrt(2*D*S/H):D; }

function clasificarABC(productos,uA=0.8,uB=0.95){
const sorted=[...productos].sort((a,b)=>b.ventaTotal-a.ventaTotal);
const total=sorted.reduce((s,p)=>s+p.ventaTotal,0);
if(!total)return sorted.map(p=>({...p,porcentaje:0,acumulado:0,categoria:'C'}));
let ac=0;
return sorted.map(p=>{
    const pct=p.ventaTotal/total;ac+=pct;
    return{...p,porcentaje:pct,acumulado:ac,categoria:ac<=uA?'A':ac<=uB?'B':'C'};
});
}

function optimizarTransporte(ofertas,demandas,costos,costoPorUnitKm=0.03){
const of=[...ofertas],de=[...demandas];
const a=Array(ofertas.length).fill(null).map(()=>Array(demandas.length).fill(0));
let ct=0;
for(let it=0;it<1000;it++){
    let mc=Infinity,bi=-1,bj=-1;
    for(let i=0;i<of.length;i++){if(of[i]===0)continue;for(let j=0;j<de.length;j++){if(de[j]===0)continue;if(costos[i][j]<mc){mc=costos[i][j];bi=i;bj=j;}}}
    if(bi===-1)break;
    const q=Math.min(of[bi],de[bj]);a[bi][bj]+=q;of[bi]-=q;de[bj]-=q;ct+=q*mc*costoPorUnitKm;
}
return{asignacion:a,costoTotal:ct};
}

function primMST(ciudades,mat){
const n=ciudades.length,vis=Array(n).fill(false);
const aristas=[];let td=0;vis[0]=true;
while(aristas.length<n-1){
    let best={u:-1,v:-1,dist:Infinity};
    for(let i=0;i<n;i++){if(!vis[i])continue;for(let j=0;j<n;j++){if(!vis[j]&&mat[i][j]<best.dist)best={u:i,v:j,dist:mat[i][j]};}}
    if(best.u===-1)break;
    aristas.push({desde:ciudades[best.u],hasta:ciudades[best.v],distancia:best.dist});
    td+=best.dist;vis[best.v]=true;
}
return{aristas,totalDist:td};
}

function construirMatriz(plantas,cds,dPlantas){
const cities=[...plantas,...cds];const n=cities.length;
const mat=Array(n).fill(null).map(()=>Array(n).fill(Infinity));
for(let i=0;i<n;i++)mat[i][i]=0;
for(let i=0;i<plantas.length;i++)for(let j=0;j<cds.length;j++){mat[i][plantas.length+j]=dPlantas[i][j];mat[plantas.length+j][i]=dPlantas[i][j];}
for(let i=0;i<cds.length;i++)for(let j=i+1;j<cds.length;j++){let m=Infinity;for(let p=0;p<plantas.length;p++){const d=dPlantas[p][i]+dPlantas[p][j];if(d<m)m=d;}mat[plantas.length+i][plantas.length+j]=m;mat[plantas.length+j][plantas.length+i]=m;}
return{ciudades:cities,matriz:mat};
}

function calcularHHI_abas(){
const g={};for(const c of STATE.data.abas.compras)g[c.Proveedor]=(g[c.Proveedor]||0)+c.CostoTotal;
const tot=Object.values(g).reduce((a,b)=>a+b,0);
return Object.values(g).reduce((s,v)=>s+Math.pow(v/tot,2),0);
}

function abcProveedores(){
const g={};for(const c of STATE.data.abas.compras)g[c.Proveedor]=(g[c.Proveedor]||0)+c.CostoTotal;
const sorted=Object.entries(g).sort((a,b)=>b[1]-a[1]);
const tot=sorted.reduce((s,[,v])=>s+v,0);let ac=0;
return sorted.map(([prov,gasto])=>{const pct=gasto/tot;ac+=pct;return{Proveedor:prov,Gasto:gasto,Porcentaje:pct,Acumulado:ac,Categoria:ac<=0.8?'A':ac<=0.95?'B':'C'};});
}

function pronostico2026(){
const g={};for(const c of STATE.data.abas.compras)g[c.Año]=(g[c.Año]||0)+c.CostoTotal;
const anios=Object.keys(g).map(Number).sort();
if(anios.length<2)return null;
const y=anios.map(a=>g[a]);const n=anios.length;
const sx=anios.reduce((a,b)=>a+b,0),sy=y.reduce((a,b)=>a+b,0);
const sxy=anios.reduce((s,a,i)=>s+a*y[i],0),sx2=anios.reduce((s,a)=>s+a*a,0);
const m=(n*sxy-sx*sy)/(n*sx2-sx*sx);
const b=(sy-m*sx)/n;
return{pendiente:m,intercept:b,pronostico:Math.max(0,b+m*2026)};
}

    <div class="graph-row" style="margin-top:1rem">

    </div></div>`;

if(step===5){

    const solo=Object.entries(pxp).filter(([,s])=>s.size===1).map(([p])=>p);

    // FIX 3: detectar inflación de precios >10% interanual por producto
    const inflItems=[];
    d.productos.forEach(prod=>{
      const byYear=d.compras.filter(c=>c.Producto===prod&&c.Precio>0).sort((a,b)=>a.Año-b.Año);
      for(let i=1;i<byYear.length;i++){
        if(byYear[i-1].Precio>0){
          const pct=(byYear[i].Precio-byYear[i-1].Precio)/byYear[i-1].Precio;
          if(pct>0.1) inflItems.push(`${prod}: ${(pct*100).toFixed(1)}% de ${byYear[i-1].Año} a ${byYear[i].Año}`);
        }
      }
    });

    return`<div class="card">
    <h2><i class="fas fa-exclamation-triangle"></i> Paso 5: Problemas Detectados</h2>

    ${solo.length?`<div class="problema alto"><strong>Productos con proveedor único</strong><p>${solo.join(', ')}</p><span class="badge badge-Alto">Alto</span></div>`:''}
    ${inflItems.length?`<div class="problema medio"><strong>Inflación de precios</strong><p>Incrementos >10% detectados: ${inflItems.join('; ')}</p><span class="badge badge-Medio">Medio</span></div>`:''}
    ${(hhi<=0.25&&!solo.length&&!inflItems.length)?'<div class="problema bajo"><strong>✅ Sin problemas críticos</strong></div>':''}
    </div>`;
}

if(step===6){
    if(!has)return`<div class="card"><p style="color:#64748b">Sin datos.</p></div>`;
    const abc=abcProveedores();
    const hhi=calcularHHI_abas();
    const pron=pronostico2026();
    return`<div class="card">
    <h2><i class="fas fa-microchip"></i> Paso 6: Optimización de Abastecimiento</h2>
    <h3>Clasificación ABC de proveedores</h3>
    <table><thead><tr><th>Proveedor</th><th>Gasto $</th><th>% Participación</th><th>% Acumulado</th><th>Categoría</th></tr></thead>
    <tbody>${abc.map(p=>`<tr><td>${p.Proveedor}</td><td>$${p.Gasto.toLocaleString()}</td><td>${(p.Porcentaje*100).toFixed(1)}%</td><td>${(p.Acumulado*100).toFixed(1)}%</td><td><span class="badge badge-${p.Categoria}">${p.Categoria}</span></td></tr>`).join('')}</tbody></table>
    <h3>Concentración (HHI) = ${hhi.toFixed(4)} — ${hhi>0.25?'⚠️ Alta':'✅ Aceptable'}</h3>
    <h3>Pronóstico de gasto 2026 (regresión lineal)</h3>
    ${pron?`<p><strong>Gasto estimado 2026:</strong> $${pron.pronostico.toFixed(2)}</p><p style="font-size:.78rem;color:#64748b">Ecuación: Gasto = ${pron.pendiente.toFixed(2)} × Año + ${pron.intercept.toFixed(2)}</p>`:'<p>No hay suficientes años para pronosticar.</p>'}
    <div id="ab-chart3" class="chart-box"></div></div>`;
}

if(step===7){
    if(!has)return`<div class="card"><p style="color:#64748b">Sin datos.</p></div>`;
    const pron=pronostico2026();
    const ahorro=pron?pron.pronostico*0.05:0;
    return`<div class="card">
    <h2><i class="fas fa-trophy"></i> Paso 7: Escenario Ideal</h2>
    <div class="kpi-row">
    <div class="kpi-card"><span>Gasto total 2022–2025</span><strong>$${d.gastoTotal.toLocaleString()}</strong></div>
    <div class="kpi-card"><span>Pronóstico 2026</span><strong>${pron?'$'+pron.pronostico.toFixed(0):'N/A'}</strong></div>
    <div class="kpi-card"><span>Ahorro potencial</span><strong>$${ahorro.toFixed(0)}</strong><p>~5% por diversificación</p></div>
    </div>
    <h3>Recomendaciones (5 puntos)</h3>
    <ul style="font-size:.83rem;line-height:2;color:#334155;padding-left:1.2rem">
    <li>✅ <strong>Diversificar proveedores clave</strong> — incorporar un tercero para insumos críticos</li>
    <li>✅ <strong>Renegociar contratos</strong> con incrementos de precio >10% anual</li>
    <li>✅ <strong>Gestión por categoría ABC</strong> — foco en proveedores clase A</li>
    <li>✅ <strong>Compras consolidadas</strong> — agrupar pedidos para descuentos por volumen</li>
    <li>✅ <strong>Monitorear HHI trimestralmente</strong> — mantener por debajo de 0.25</li>
    </ul></div>`;
}
return '';
}

/* ════════════════════════════════════════════
GRÁFICOS (Plotly)
════════════════════════════════════════════ */
function initCharts(mod, step){
if(!window.Plotly) return;
const layout_base={margin:{l:40,r:20,t:40,b:60},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',font:{family:'Inter',size:12,color:'#334155'}};
const L=o=>Object.assign({},layout_base,o);

  /* ABC */
if(mod==='abc'&&step===4){
    const cls=clasificarABC(STATE.data.abc.productos);
    if(document.getElementById('abc-chart1'))
    Plotly.newPlot('abc-chart1',[{x:cls.map(p=>p.producto),y:cls.map(p=>p.ventaTotal),type:'bar',marker:{color:'#1e6f5c'},name:'Ventas'}],L({title:'Ventas por producto (USD)',yaxis:{title:'USD'}}),{responsive:true});
    if(document.getElementById('abc-chart2')){
    const cats={A:0,B:0,C:0};cls.forEach(p=>cats[p.categoria]+=p.ventaTotal);
    Plotly.newPlot('abc-chart2',[{labels:Object.keys(cats),values:Object.values(cats),type:'pie',hole:.3,marker:{colors:['#1e6f5c','#e9b35f','#94a3b8']}}],L({title:'Por categoría'}),{responsive:true});
    }
}
if(mod==='abc'&&step===6){
    const cls=clasificarABC(STATE.data.abc.productos);
    const eoqs=cls.map(p=>calcEOQ(p.cantidad,p.costoPedido,p.precio*0.2));
    if(document.getElementById('abc-chart3'))
    Plotly.newPlot('abc-chart3',[{x:cls.map(p=>p.producto),y:eoqs,type:'bar',marker:{color:cls.map(p=>p.categoria==='A'?'#1e6f5c':p.categoria==='B'?'#e9b35f':'#94a3b8')}}],L({title:'EOQ por producto',yaxis:{title:'Unidades'}}),{responsive:true});
}
if(mod==='abc'&&step===7){
    const cls=clasificarABC(STATE.data.abc.productos);
    if(document.getElementById('abc-chart4')){
    const gCat={A:0,B:0,C:0};cls.forEach(p=>gCat[p.categoria]+=p.ventaTotal);
    Plotly.newPlot('abc-chart4',[{x:Object.keys(gCat),y:Object.values(gCat),type:'bar',marker:{color:['#1e6f5c','#e9b35f','#94a3b8']}}],L({title:'Ventas por categoría ABC',yaxis:{title:'USD'}}),{responsive:true});
    }
}

  /* PLANES */
const pl=STATE.data.planes.planes;
if(mod==='planes'&&step===4&&pl.length){
    if(document.getElementById('pl-chart1'))
    Plotly.newPlot('pl-chart1',[{x:pl.map(p=>`Plan ${p.nombre}`),y:pl.map(p=>p.costoTotal),type:'bar',marker:{color:'#1e6f5c'}}],L({title:'Costo total por plan',yaxis:{title:'USD'}}),{responsive:true});
    if(document.getElementById('pl-chart2'))
    Plotly.newPlot('pl-chart2',[{labels:pl.map(p=>`Plan ${p.nombre}`),values:pl.map(p=>p.costoTotal),type:'pie',hole:.3}],L({title:'Participación'}),{responsive:true});
    if(document.getElementById('pl-chart3'))
    Plotly.newPlot('pl-chart3',[
        {x:pl.map(p=>`Plan ${p.nombre}`),y:pl.map(p=>p.costoContratacion),name:'Contratación',type:'bar'},
        {x:pl.map(p=>`Plan ${p.nombre}`),y:pl.map(p=>p.costoDespido),name:'Despido',type:'bar'},
        {x:pl.map(p=>`Plan ${p.nombre}`),y:pl.map(p=>p.costoSubcontratacion),name:'Subcontrat.',type:'bar'},
        {x:pl.map(p=>`Plan ${p.nombre}`),y:pl.map(p=>p.costoHorasExtra),name:'Hrs Extra',type:'bar'},
        {x:pl.map(p=>`Plan ${p.nombre}`),y:pl.map(p=>p.costoInventario),name:'Inventario',type:'bar'}
    ],L({barmode:'stack',title:'Composición de costos'}),{responsive:true});
    if(document.getElementById('pl-chart4'))
    Plotly.newPlot('pl-chart4',[{x:pl.map(p=>p.costoSubcontratacion),y:pl.map(p=>p.costoHorasExtra),mode:'markers',type:'scatter',text:pl.map(p=>`Plan ${p.nombre}`),marker:{size:16,color:pl.map(p=>p.costoTotal),colorscale:'Viridis',showscale:true}}],L({title:'Subcontratación vs Horas Extra',xaxis:{title:'Subcontratación (USD)'},yaxis:{title:'Horas Extra (USD)'}}),{responsive:true});
}
if(mod==='planes'&&step===6&&pl.length){
    if(document.getElementById('pl-chart5'))
    Plotly.newPlot('pl-chart5',[{x:pl.map(p=>`Plan ${p.nombre}`),y:pl.map(p=>p.costoTotal),type:'bar',marker:{color:pl.map(p=>p.nombre===STATE.data.planes.mejorPlan?'#22c55e':'#1e6f5c')}}],L({title:'Comparativa final de costos — Costo Total',yaxis:{title:'USD'}}),{responsive:true});
    if(document.getElementById('pl-chart6'))
    Plotly.newPlot('pl-chart6',[
        {x:pl.map(p=>`Plan ${p.nombre}`),y:pl.map(p=>p.costoContratacion),name:'Contratación',type:'bar',marker:{color:'#3b82f6'}},
        {x:pl.map(p=>`Plan ${p.nombre}`),y:pl.map(p=>p.costoDespido),name:'Despido',type:'bar',marker:{color:'#f59e0b'}},
        {x:pl.map(p=>`Plan ${p.nombre}`),y:pl.map(p=>p.costoSubcontratacion),name:'Subcontrat.',type:'bar',marker:{color:'#22c55e'}},
        {x:pl.map(p=>`Plan ${p.nombre}`),y:pl.map(p=>p.costoHorasExtra),name:'Hrs Extra',type:'bar',marker:{color:'#ef4444'}},
        {x:pl.map(p=>`Plan ${p.nombre}`),y:pl.map(p=>p.costoInventario),name:'Inventario',type:'bar',marker:{color:'#a855f7'}}
    ],L({barmode:'stack',title:'Desglose de costos por componente (barras apiladas)',yaxis:{title:'USD'},legend:{orientation:'h',y:-0.2}}),{responsive:true});
}

  /* DISTRIBUCIÓN */
const dd=STATE.data.dist;
if(mod==='dist'&&step===4&&dd.datosCargados){
    if(document.getElementById('dt-chart1'))
    Plotly.newPlot('dt-chart1',[{x:dd.cds,y:dd.demandas,type:'bar',marker:{color:'#2c7da0'}}],L({title:'Demanda por CD',yaxis:{title:'Unidades'}}),{responsive:true});
    if(document.getElementById('dt-chart2')){
    const {ciudades,matriz}=construirMatriz(dd.plantas,dd.cds,dd.distancias);
    const mst=primMST(ciudades,matriz);
    const coords={'Quito':[-78.47,-0.18],'Guayaquil':[-79.89,-2.19],'Ibarra':[-78.12,0.35],'Santo Domingo':[-79.17,-0.25],'Ambato':[-78.62,-1.25],'Cuenca':[-79.00,-2.90],'Manta':[-80.71,-0.97],'Loja':[-79.20,-3.99]};
    const nodeX=ciudades.map(c=>coords[c]?coords[c][0]:0),nodeY=ciudades.map(c=>coords[c]?coords[c][1]:0);
    const edgeTraces=mst.aristas.map(e=>{const fi=ciudades.indexOf(e.desde),ti=ciudades.indexOf(e.hasta);return{x:[nodeX[fi],nodeX[ti],null],y:[nodeY[fi],nodeY[ti],null],mode:'lines',line:{color:'#1e6f5c',width:2},hoverinfo:'text',text:`${e.distancia}km`,showlegend:false};});
    const nodeTrace={x:nodeX,y:nodeY,mode:'markers+text',type:'scatter',marker:{size:18,color:'#2c7da0'},text:ciudades,textposition:'top center'};
    Plotly.newPlot('dt-chart2',[...edgeTraces,nodeTrace],L({title:'MST — Árbol de mínima expansión',xaxis:{visible:false},yaxis:{visible:false}}),{responsive:true});
    // Mostrar distancia total del MST
    const mstRes=document.getElementById('mst-result');
    const mstKm=document.getElementById('mst-total-km');
    if(mstRes&&mstKm){mstKm.textContent=mst.totalDist.toLocaleString()+' km';mstRes.style.display='block';}
    }
}

  /* ABASTECIMIENTO */
const da=STATE.data.abas;
if(mod==='abas'&&step===4&&da.datosCargados){
    const g={};for(const c of da.compras)g[c.Año]=(g[c.Año]||0)+c.CostoTotal;
    const años=Object.keys(g).map(Number).sort();
    if(document.getElementById('ab-chart1'))
    Plotly.newPlot('ab-chart1',[{x:años,y:años.map(a=>g[a]),type:'scatter',mode:'lines+markers',line:{color:'#1e6f5c'}}],L({title:'Gasto total anual',yaxis:{title:'USD'}}),{responsive:true});
    if(document.getElementById('ab-chart2')){
    const gC={};for(const c of da.compras)gC[c.Categoria]=(gC[c.Categoria]||0)+c.CostoTotal;
    Plotly.newPlot('ab-chart2',[{labels:Object.keys(gC),values:Object.values(gC),type:'pie',hole:.3}],L({title:'Por categoría'}),{responsive:true});
    }
}
if(mod==='abas'&&step===6&&da.datosCargados){
    const abc=abcProveedores();
    const pron=pronostico2026();
    if(document.getElementById('ab-chart3')&&pron){
    const g={};for(const c of da.compras)g[c.Año]=(g[c.Año]||0)+c.CostoTotal;
    const años=Object.keys(g).map(Number).sort();
    const vals=años.map(a=>g[a]);
    const ext=2026,extVal=pron.pronostico;
    Plotly.newPlot('ab-chart3',[
        {x:años,y:vals,type:'scatter',mode:'lines+markers',name:'Gasto real',line:{color:'#1e6f5c'}},
        {x:[...años,ext],y:[...vals,extVal],type:'scatter',mode:'lines',name:'Pronóstico',line:{color:'#e9b35f',dash:'dot'}}
    ],L({title:'Pronóstico de gasto 2026',yaxis:{title:'USD'}}),{responsive:true});
    }
}
}
</script>
